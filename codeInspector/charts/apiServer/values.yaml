# Default values for apiServer
namespace: sandbox

configMap:
  PYTHONUNBUFFERED: "1"
  APP_ENV: "production"
  PORT: "8000"
  BACKEND_URL_OPENSANDBOX: "http://opensandbox-server.opensandbox-system.svc.cluster.local"
  GATEWAY_SECRET_NAME: "apikey"
  GATEWAY_SECRET_NAMESPACE: "agentgateway-system"
  GATEWAY_SECRET_KEY: "api-key"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_MINUTES: "60"
  JWT_ISSUER: "code-inspector"
  JWT_SIGNING_SECRET: "default-signing-secret-change-me"

secret:
  E2B_API_KEY: ""

deployment:
  replicaCount: 1
  image:
    repository: fastapi
    tag: "1.0.0"
    pullPolicy: Never
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  host: sandbox-api.local
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
