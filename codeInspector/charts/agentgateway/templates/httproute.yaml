apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentgateway-dashboard-route
  namespace: {{ .Values.namespace }}
spec:
  hostnames:
  {{- range .Values.httproute.hostnames }}
  - {{ . }}
  {{- end }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: agentgateway-proxy
    namespace: {{ .Values.namespace }}
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /dashboard
    backendRefs:
    - name: dashboard-service
      namespace: opensandbox-system
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentgateway-api-route
  namespace: {{ .Values.namespace }}
spec:
  hostnames:
  {{- range .Values.httproute.hostnames }}
  - {{ . }}
  {{- end }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: agentgateway-proxy
    namespace: {{ .Values.namespace }}
    sectionName: http
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: URLRewrite          
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: sandbox-api-service
      namespace: opensandbox-system
      port: 80
