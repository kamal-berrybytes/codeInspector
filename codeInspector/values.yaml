  deployment:
    replicaCount: 1
    image:
      repository: fastapi
      tag: "1.0.0"
      pullPolicy: Never
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  ingress:
    enabled: true
    className: nginx
    host: sandbox-api.local
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
      nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Dashboard component values
dashboard:
  enabled: true
  namespace: opensandbox-system
  replicaCount: 1
  image:
    repository: dashboard
    tag: "1.0.0"
    pullPolicy: Never
  service:
    type: ClusterIP
    port: 80

# MetalLB component values
metallb:
  enabled: true
  namespace: metallb-system
  ipAddressPool:
    addresses:
      - 172.18.0.200-172.18.0.250
  l2Advertisement:
    enabled: true

# Kind Cluster component values
kindCluster:
  enabled: false
  namespace: kind-cluster
  runtimeClass:
    name: gvisor
    handler: runsc



# OpenSandbox component values
opensandbox:
  enabled: true
  namespace: opensandbox-system
  controller:
    replicaCount: 1
    image:
      repository: opensandbox-controller
      tag: 1.0.0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  server:
    replicaCount: 1
    image:
      repository: opensandbox-server
      tag: 1.0.0
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storage:
      enabled: true
      pvcName: "scan-pvc"
      size: "10Gi"
      accessMode: "ReadWriteMany"
      mountPath: "/data"



# OpenSandbox Resource Pool component values
opensandboxResourcePool:
  enabled: false
  namespace: opensandbox-system
  pool:
    name: my-sandbox-pool
    container:
      image: codeinterpreter:3.1.0
      ports:
        - containerPort: 44772
        - containerPort: 54321
    capacitySpec:
      bufferMin: 3
      bufferMax: 10
      poolMin: 1
      poolMax: 50