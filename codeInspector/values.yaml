# Agent Gateway component values
agentgateway:
  enabled: true
  namespace: agentgateway-system
  httproute:
    hostnames:
      - shininess-enroll-going.ngrok-free.dev
    backendService:
      name: sandbox-api-service
      port: 80
  gateway:
    gatewayClassName: agentgateway
    listeners:
      - protocol: HTTP
        port: 80
        name: http
  policy:
    authenticationType: "jwt"
    jwtMode: "Strict"
  # No secret section needed for gateway as JWKS is inline in policy

# API Server component values
