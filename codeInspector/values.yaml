# ─────────────────────────────────────────────────────────────────────────────
# Z1 Sandbox Website (formerly named "dashboard")
# This is the main public-facing website + developer dashboard with Auth0 login.
# Build the image first:
#   cd /home/berrybytes/Desktop/z1sandbox-website
#   docker build \
#     --build-arg VITE_AUTH0_DOMAIN=dev-axwc0ui527kw0c5d.us.auth0.com \
#     --build-arg VITE_AUTH0_CLIENT_ID=sqVN3z2Er7YxXYK4FxbpOaYOqL2ju22D \
#     --build-arg VITE_AUTH0_AUDIENCE=https://code-inspector-api \
#     --build-arg VITE_RECAPTCHA_SITE_KEY=6LeKiswsAAAAAMF_8fxlr1z7VCRQ0zr-oFfncfd0 \
#     -t z1sandbox-website:latest .
# ─────────────────────────────────────────────────────────────────────────────
z1sandbox-website:
  enabled: true
  namespace: opensandbox-system
  replicaCount: 1
  image:
    repository: kamalberrybytes/z1sandbox-website
    tag: "1.0.0"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  # Auth0 values are baked at build time — document them here for reference
  auth0:
    domain: "dev-axwc0ui527kw0c5d.us.auth0.com"
    clientId: "sqVN3z2Er7YxXYK4FxbpOaYOqL2ju22D"
    audience: "https://code-inspector-api"
  # In-cluster ClusterIP service name of the FastAPI backend
  apiServiceName: "sandbox-api-service"

  # Runtime Environment Variables (Injected at container startup)
  recaptchaSiteKey: "6LeKiswsAAAAAMF_8fxlr1z7VCRQ0zr-oFfncfd0"
  googleChatWebhookUrl: "https://chat.googleapis.com/v1/spaces/AAQAQC-SfqE/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=9HUfBxrsiwrTWAyTkwc6qWZ809reZvFb6tGzkJi21uQ"
  
  # Dashboard Applications Config
  # Adding items here will automatically create new cards in the dashboard.
  backends:
    - id: "Z1_SANDBOX"
      name: "01 Sandbox"
      description: "Active remote backend for live code evaluation and execution workloads."
      baseUrl: "https://shininess-enroll-going.ngrok-free.dev/api/z1sandbox"
      documentationUrl: "https://shininess-enroll-going.ngrok-free.dev/api/z1sandbox/docs"
      icon: "terminal"
      color: "indigo"
    # To use absolute URLs that automatically update with your hostname:
    # baseUrl: "https://{{ index .Values.agentgateway.httproute.hostnames 0 }}/api/z1sandbox"
    
    # - id: "OPEN_SANDBOX"
    #   name: "OpenSandbox"
    #   description: "Distributed scaling cluster configuration and backend telemetry service."
    #   baseUrl: "/api/opensandbox"
    #   documentationUrl: "/api/opensandbox/docs"
    #   icon: "box"
    #   color: "emerald"
    
    # - id: "TENCEND"
    #   name: "Tencend"
    #   description: "Distributed scaling cluster configuration and backend telemetry service."
    #   baseUrl: "/api/tencend"
    #   documentationUrl: "/api/tencend/docs"
    #   icon: "box"
    #   color: "emerald"
    
      
  ingress:
    enabled: false
    className: nginx
    host: "sandbox.local"
    annotations: {}
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# MetalLB component values
metallb:
  enabled: true
  namespace: metallb-system
  ipAddressPool:
    addresses:
      - 172.18.0.200-172.18.0.250
  l2Advertisement:
    enabled: true

# Kind Cluster component values
kindCluster:
  enabled: false
  namespace: kind-cluster
  runtimeClass:
    name: gvisor
    handler: runsc



# OpenSandbox component values
opensandbox:
  enabled: true
  namespace: opensandbox-system
  controller:
    replicaCount: 1
    image:
      repository: kamalberrybytes/opensandbox-controller
      tag: 1.0.0
      pullPolicy: Always
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  server:
    replicaCount: 1
    sandboxImage: "kamalberrybytes/codeinterpreter:1.0.0"
    image:
      repository: kamalberrybytes/opensandbox-server
      tag: 1.0.0
      pullPolicy: Always
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storage:
      enabled: true
      pvcName: "scan-pvc"
      size: "10Gi"
      accessMode: "ReadWriteMany"
      mountPath: "/data"



# OpenSandbox Resource Pool component values
opensandboxResourcePool:
  enabled: false
  namespace: opensandbox-system
  pool:
    name: my-sandbox-pool
    container:
      image: kamalberrybytes/codeinterpreter:1.0.0
      ports:
        - containerPort: 44772
        - containerPort: 54321
    capacitySpec:
      bufferMin: 3
      bufferMax: 10
      poolMin: 1
      poolMax: 50