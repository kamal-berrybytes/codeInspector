server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA Client-Side Routing ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy → sandbox-api-service (in-cluster) ────────────────────────
    # All /v1/* calls (API keys, scan jobs, health) go to the FastAPI backend
    location /v1/ {
        proxy_pass http://sandbox-api-service/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # All /backend/* calls (proxied z1sandbox / opensandbox docs) go to FastAPI
    location /backend/ {
        proxy_pass http://sandbox-api-service/backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://sandbox-api-service/health;
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
