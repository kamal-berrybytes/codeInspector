{{- if .Values.storage.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.storage.pvcName | default "scan-pvc" }}
  namespace: {{ include "opensandbox-server.namespace" . }}
  labels:
    {{- include "opensandbox-server.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.storage.accessMode | default "ReadWriteMany" }}
  resources:
    requests:
      storage: {{ .Values.storage.size | default "10Gi" }}
{{- end }}
