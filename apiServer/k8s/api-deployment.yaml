# ─────────────────────────────────────────────
# api-deployment.yaml
# Kubernetes manifest for Sandbox FastAPI App
#
# Apply:  kubectl apply -f api-deployment.yaml
# Delete: kubectl delete -f api-deployment.yaml
# ─────────────────────────────────────────────

---
# 1. Namespace — isolate all resources
apiVersion: v1
kind: Namespace
metadata:
  name: sandbox
  labels:
    app: sandbox-api

---
# 2. ConfigMap — non-sensitive environment config
apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-api-config
  namespace: sandbox
data:
  PYTHONUNBUFFERED: "1"
  APP_ENV: "production"
  PORT: "8000"
  BACKEND_URL_OPENSANDBOX: "http://opensandbox-server.opensandbox-system.svc.cluster.local"
  # BACKEND_URL_PYTHON: "http://python-sandbox-service.sandbox.svc.cluster.local"

---
# 3. Secret — sensitive credentials (base64 encoded)
#    Encode value:  echo -n "your_key_here" | base64
apiVersion: v1
kind: Secret
metadata:
  name: sandbox-api-secret
  namespace: sandbox
type: Opaque
data:
  E2B_API_KEY: ""   # echo -n "your_e2b_key" | base64

---
# 3.1. ServiceAccount — identity for the API pod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-api
  namespace: sandbox

---
# 3.2. Role — permissions to update the gateway secret
# This role must exist in the namespace where the secret is stored
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-secret-patcher
  namespace: agentgateway-system
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["apikey"]
  verbs: ["get", "patch", "update"]

---
# 3.3. RoleBinding — bind the SA to the Role across namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-api-gateway-patcher-binding
  namespace: agentgateway-system
subjects:
- kind: ServiceAccount
  name: sandbox-api
  namespace: sandbox
roleRef:
  kind: Role
  name: gateway-secret-patcher
  apiGroup: rbac.authorization.k8s.io

---
# 4. Deployment — runs the FastAPI app
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-api
  namespace: sandbox
  labels:
    app: sandbox-api
    version: "1.0.0"
spec:
  replicas: 1                          # run 2 pods for high availability
  selector:
    matchLabels:
      app: sandbox-api
  strategy:
    type: RollingUpdate                # zero-downtime deploys
    rollingUpdate:
      maxSurge: 1                      # one extra pod during update
      maxUnavailable: 0                # never go below desired replicas
  template:
    metadata:
      labels:
        app: sandbox-api
        version: "1.0.0"
    spec:
      serviceAccountName: sandbox-api
      # ── Security context ──────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # ── Containers ────────────────────────
      containers:
        - name: sandbox-api
          image: fastapi:1.0.0         # your local Docker image
          imagePullPolicy: Never       # use local image, never pull from registry

          ports:
            - containerPort: 8000
              protocol: TCP

          # ── Environment variables ──────────
          envFrom:
            - configMapRef:
                name: sandbox-api-config
          env:
            - name: E2B_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-api-secret
                  key: E2B_API_KEY
                  optional: true       # won't crash if secret is empty

          # ── Health checks ──────────────────
          livenessProbe:               # restart pod if app hangs
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:              # only send traffic when ready
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:                # give app time to start up
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 10
            periodSeconds: 5

          # ── Resource limits ────────────────
          resources:
            requests:
              cpu: "100m"              # 0.1 CPU core
              memory: "128Mi"
            limits:
              cpu: "500m"              # 0.5 CPU core
              memory: "256Mi"

          # ── Security ───────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # ── Writable tmp volume ────────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      # ── Restart policy ────────────────────
      restartPolicy: Always

      # ── Spread pods across nodes ──────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: sandbox-api

---
# 5. Service — stable internal ClusterIP endpoint
apiVersion: v1
kind: Service
metadata:
  name: sandbox-api-service
  namespace: sandbox
  labels:
    app: sandbox-api
spec:
  selector:
    app: sandbox-api
  ports:
    - name: http
      protocol: TCP
      port: 80                         # external port
      targetPort: 8000                 # container port
  type: ClusterIP

---
# 6. Ingress — expose API to the outside world
#    Requires an ingress controller (e.g. nginx):
#    kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbox-api-ingress
  namespace: sandbox
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: sandbox-api.local          # replace with your actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sandbox-api-service
                port:
                  number: 80

---
# 7. HorizontalPodAutoscaler — auto-scale on CPU load
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sandbox-api-hpa
  namespace: sandbox
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sandbox-api
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70       # scale up when CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80       # scale up when memory > 80%

─────────────────────────────────────────────────────────────────────────────
api-deployment.yaml
Kubernetes manifest for Sandbox FastAPI Gateway (multi-backend routing)

Apply:  kubectl apply -f api-deployment.yaml
Delete: kubectl delete -f api-deployment.yaml

─── ADDING A NEW BACKEND ────────────────────────────────────────────────────
 1. Add three lines to the ConfigMap below:
      SANDBOX_<ID>_URL:    http://your-service.namespace.svc.cluster.local
      SANDBOX_<ID>_NAME:   Human Readable Name    (optional)
      SANDBOX_<ID>_WEIGHT: "10"                   (optional, for weighted routing)
 2. kubectl apply -f api-deployment.yaml
 3. The gateway picks up the new backend on next pod start, OR call:
      POST /backends/reload   (zero-downtime, no restart needed)

─── ROUTING MODES ───────────────────────────────────────────────────────────
 Set SANDBOX_ROUTING_MODE in the ConfigMap to one of:
   round_robin  (default) - cycle through healthy backends
   weighted               - pick by WEIGHT ratio
   least_used             - pick backend with fewest in-flight requests
   explicit               - caller must supply ?backend_id=<ID>
─────────────────────────────────────────────────────────────────────────────

